name: ✨Feature Request
description: Suggest an idea or enhancement for this project
type: Enhancement
body:
  - type: markdown
    attributes:
      value: |
        > [!WARNING]
        > **Before reporting, always check for similar existing issues on our tracker.**
        > If your issue has already been reported, please post a comment on it instead of opening a duplicate.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe what's frustrating or missing.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Be as specific as possible.
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: I've also thought about...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, mockups, or links that would help explain the request.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: I'd be willing to submit a pull request for this feature.
          required: false
