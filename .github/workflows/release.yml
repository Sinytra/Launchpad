name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'The published artifact release type'
        required: false
        default: 'STABLE'
        type: choice
        options:
          - STABLE
          - BETA
          - ALPHA

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        uses: FabricMC/fabric-action-scripts@b9e2c6a197eb351869ba682b28482673c8844f80 # v3
        id: changelog
        with:
          context: changelog
          workflow_id: release.yml

      - name: Setup JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'microsoft'
          java-version: '25'

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle
        run: ./gradlew clean build --stacktrace
  
  publish:
    strategy:
      matrix:
        include:
          - name: Maven
            task: publish :transformer:publish
            url: https://maven.su5ed.dev/releases/org/sinytra/launchpad
          - name: GitHub
            task: publishGithub
            url: https://github.com/Sinytra/Launchpad/releases
          - name: CurseForge
            task: publishCurseforge
            url: https://www.curseforge.com/minecraft/mc-mods/launchpad
          - name: Modrinth
            task: publishModrinth
            url: https://modrinth.com/mod/launchpad
    name: Publish ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ matrix.name }}
      url: ${{ matrix.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'microsoft'
          java-version: '25'

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Publish with Gradle
        run: ./gradlew ${{ matrix.task }} --stacktrace
        env:
          PUBLISH_RELEASE_TYPE: ${{ inputs.release_type }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          CHANGELOG: ${{ needs.build.outputs.changelog }}
